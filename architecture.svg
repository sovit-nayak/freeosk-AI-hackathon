 <svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: white;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- TIER 1: Data ingestion -->
<text x="340" y="30" text-anchor="middle" font-size="15px" font-weight="600" fill="#1a1a1a">Data ingestion</text>

<rect x="40" y="46" width="130" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="105" y="64" text-anchor="middle" font-size="14px" font-weight="500" fill="#085041">Open-Meteo</text>
<text x="105" y="80" text-anchor="middle" font-size="12px" fill="#0F6E56">Weather API</text>

<rect x="190" y="46" width="130" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="255" y="64" text-anchor="middle" font-size="14px" font-weight="500" fill="#085041">Nominatim</text>
<text x="255" y="80" text-anchor="middle" font-size="12px" fill="#0F6E56">Geocoding API</text>

<rect x="360" y="46" width="130" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="425" y="64" text-anchor="middle" font-size="14px" font-weight="500" fill="#085041">Kiosk feeds</text>
<text x="425" y="80" text-anchor="middle" font-size="12px" fill="#0F6E56">Inventory + promos</text>

<rect x="510" y="46" width="130" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="575" y="64" text-anchor="middle" font-size="14px" font-weight="500" fill="#085041">Foot traffic</text>
<text x="575" y="80" text-anchor="middle" font-size="12px" fill="#0F6E56">Synthetic index</text>

<!-- Arrows: sources → feature eng -->
<line x1="105" y1="96" x2="105" y2="148" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="255" y1="96" x2="255" y2="148" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="425" y1="96" x2="425" y2="148" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="575" y1="96" x2="575" y2="148" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- TIER 2: Feature engineering -->
<text x="340" y="145" text-anchor="middle" font-size="15px" font-weight="600" fill="#1a1a1a">Feature engineering</text>

<rect x="80" y="158" width="520" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="180" text-anchor="middle" font-size="14px" font-weight="500" fill="#3C3489">generate_data.py</text>
<text x="340" y="198" text-anchor="middle" font-size="12px" fill="#534AB7">Rolling avg · lag features · DOW · month · weather enrichment</text>

<!-- Arrow: feature eng → BigQuery -->
<line x1="340" y1="214" x2="340" y2="260" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- TIER 3: Data warehouse -->
<text x="340" y="256" text-anchor="middle" font-size="15px" font-weight="600" fill="#1a1a1a">Data warehouse</text>

<rect x="140" y="268" width="400" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="290" text-anchor="middle" font-size="14px" font-weight="500" fill="#0C447C">GCP BigQuery</text>
<text x="340" y="308" text-anchor="middle" font-size="12px" fill="#185FA5">demand_history · demand_forecast · depletion_forecast</text>

<!-- Arrow: BigQuery → ML models -->
<line x1="260" y1="324" x2="200" y2="378" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="420" y1="324" x2="480" y2="378" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- TIER 4: ML models -->
<text x="340" y="370" text-anchor="middle" font-size="15px" font-weight="600" fill="#1a1a1a">ML models</text>

<rect x="80" y="382" width="220" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="190" y="402" text-anchor="middle" font-size="14px" font-weight="500" fill="#712B13">XGBoost</text>
<text x="190" y="420" text-anchor="middle" font-size="12px" fill="#993C1D">MAE ~10 · 300 trees · depth 6</text>

<rect x="380" y="382" width="220" height="56" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text x="490" y="402" text-anchor="middle" font-size="14px" font-weight="500" fill="#72243E">Prophet</text>
<text x="490" y="420" text-anchor="middle" font-size="12px" fill="#993556">Weekly + yearly seasonality</text>

<!-- Arrow: models → simulation -->
<line x1="190" y1="438" x2="280" y2="490" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="490" y1="438" x2="400" y2="490" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- TIER 5: Inventory simulation -->
<text x="340" y="484" text-anchor="middle" font-size="15px" font-weight="600" fill="#1a1a1a">Inventory simulation</text>

<rect x="160" y="496" width="360" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="340" y="516" text-anchor="middle" font-size="14px" font-weight="500" fill="#633806">Depletion simulator</text>
<text x="340" y="532" text-anchor="middle" font-size="12px" fill="#854F0B">Forward projection → days to stockout</text>

<!-- Arrow: simulation → dashboard -->
<line x1="340" y1="546" x2="340" y2="590" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- TIER 6: Presentation layer -->
<text x="340" y="586" text-anchor="middle" font-size="15px" font-weight="600" fill="#1a1a1a">Presentation layer</text>

<rect x="60" y="598" width="280" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="200" y="618" text-anchor="middle" font-size="14px" font-weight="500" fill="#27500A">Streamlit dashboard</text>
<text x="200" y="636" text-anchor="middle" font-size="12px" fill="#3B6D11">5 tabs · Plotly charts · alerts</text>

<rect x="380" y="598" width="260" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="510" y="618" text-anchor="middle" font-size="14px" font-weight="500" fill="#791F1F">Llama 3.1 (HF API)</text>
<text x="510" y="636" text-anchor="middle" font-size="12px" fill="#A32D2D">NL chat · ops recommendations</text>

<!-- Arrow: LLM ↔ Dashboard -->
<line x1="340" y1="626" x2="378" y2="626" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Live weather arrow into dashboard -->
<line x1="40" y1="71" x2="40" y2="626" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="40" y1="626" x2="58" y2="626" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="36" y="400" text-anchor="middle" font-size="12px" fill="#888" transform="rotate(-90,36,400)">Live weather feed</text>

<!-- Bottom: deployment -->
<rect x="140" y="678" width="400" height="34" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="699" text-anchor="middle" font-size="12px" fill="#444441">Deployed on Streamlit Community Cloud · GitHub CI/CD · $0 cost</text>
<line x1="340" y1="654" x2="340" y2="676" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

</svg>